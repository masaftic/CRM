# db postgis/postgis:16-3.5

services:
  crm-db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: CRM_DB
    ports:
      - "5432:5432"
    volumes:
      - crm-db-data:/var/lib/postgresql/data

volumes:
  crm-db-data: